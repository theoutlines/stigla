<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stigla — Map — coverage glow (zoomed out)</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="page-badge page-badge--flag">FLAG — behind a feature flag</div>
<div class="stage">
  <div class="phone">
    <div class="screen ">
      <div class="status-bar"><div class="status-bar__time">9:41</div><div class="status-bar__icons"><svg class="icon" width="17" height="12" viewBox="0 0 17 12" fill="currentColor"><rect x="0" y="8" width="3" height="4" rx="1"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="1"/><rect x="9" y="3" width="3" height="9" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1"/></svg><svg class="icon" width="16" height="12" viewBox="0 0 16 12" fill="currentColor"><path d="M8 2.5c2.6 0 5 1 6.8 2.6l1.2-1.4A11 11 0 0 0 8 .5 11 11 0 0 0 0 3.7l1.2 1.4A9.4 9.4 0 0 1 8 2.5Z"/><path d="M8 6c1.4 0 2.7.5 3.7 1.4l1.2-1.4A7 7 0 0 0 8 4a7 7 0 0 0-4.9 2l1.2 1.4A5.4 5.4 0 0 1 8 6Z"/><path d="M8 9.5 10.2 7A3.4 3.4 0 0 0 8 6.2 3.4 3.4 0 0 0 5.8 7L8 9.5Z"/></svg><svg class="icon" width="27" height="13" viewBox="0 0 27 13" fill="none"><rect x="0.5" y="0.5" width="22" height="12" rx="3" stroke="currentColor" opacity="0.5"/><rect x="2" y="2" width="17" height="9" rx="1.5" fill="currentColor"/><rect x="24" y="4" width="2" height="5" rx="1" fill="currentColor" opacity="0.5"/></svg></div></div>

<div class="map-canvas"></div>

<!-- Ambient coverage heatmap: the SAME layer as the Coverage tab, but a modest
     background (lower intensity/opacity) that stands in for the numbered stop
     clusters at far zoom. Toned-down gradients vs coverage.html. -->
<svg class="coverage-heat" viewBox="0 0 390 844" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="hot" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="30%" stop-color="#ffb860" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#ef7b22" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#8c370c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warm" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ef7b22" stop-opacity="0.34"/>
      <stop offset="60%" stop-color="#8c370c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#3c1804" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- corridors radiating from the centre -->
  <ellipse cx="200" cy="430" rx="160" ry="130" fill="url(#warm)"/>
  <ellipse cx="200" cy="415" rx="72" ry="58" fill="url(#hot)"/>
  <ellipse cx="120" cy="300" rx="95" ry="72" fill="url(#warm)"/>
  <ellipse cx="300" cy="560" rx="120" ry="95" fill="url(#warm)"/>
  <ellipse cx="288" cy="545" rx="42" ry="36" fill="url(#hot)"/>
  <ellipse cx="90" cy="620" rx="85" ry="72" fill="url(#warm)"/>
  <ellipse cx="320" cy="230" rx="74" ry="60" fill="url(#warm)"/>
  <ellipse cx="150" cy="700" rx="70" ry="60" fill="url(#warm)"/>
</svg>

<div class="top-buttons"><div class="round-button glyph"><svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1='3' y1='6' x2='21' y2='6'/><line x1='3' y1='12' x2='21' y2='12'/><line x1='3' y1='18' x2='21' y2='18'/></svg></div><div><div class="round-button glyph"><svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx='12' cy='12' r='4'/><line x1='12' y1='2' x2='12' y2='5'/><line x1='12' y1='19' x2='12' y2='22'/><line x1='2' y1='12' x2='5' y2='12'/><line x1='19' y1='12' x2='22' y2='12'/></svg></div></div></div>

<!-- Live vehicles stay on top of the glow. Far zoom = compact coloured dots. -->
<div class="vehicle-dot vehicle-dot--tram" style="left:186px;top:406px"></div>
<div class="vehicle-dot vehicle-dot--bus" style="left:236px;top:300px"></div>
<div class="vehicle-dot vehicle-dot--trolley" style="left:150px;top:520px"></div>
<div class="vehicle-dot vehicle-dot--bus" style="left:300px;top:558px"></div>
<div class="vehicle-dot vehicle-dot--bus" style="left:110px;top:628px"></div>
<div class="me-dot" style="left:210px;top:640px"></div>

<div class="bottom-dock">
  <div class="search-bar">
    <span class="search-bar__icon glyph"><svg class="icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx='11' cy='11' r='7'/><line x1='16.5' y1='16.5' x2='21' y2='21'/></svg></span>
    <span class="search-bar__input placeholder">Search stops, streets, or lines…</span>
  </div>
</div>

    </div>
  </div>
  <div class="stage__caption">Zoomed out: the numbered stop clusters give way to an ambient coverage-density glow (same layer as the Coverage tab, dimmer); live vehicle dots stay on top. Crossfades back to stops on zoom-in. Behind coverage_on_main_map.</div>
</div>
</body>
</html>
